<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reCAPTCHA v2 Verification Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <link href="https://cdn.jsdelivr.net/npm/fontsource-inter@5.0.13/latin.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        .captcha-container {
            display: flex;
            justify-content: center;
            margin-top: 1rem;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden transform transition-all hover:scale-[1.01] duration-300">
        
        <!-- Header -->
        <div class="bg-indigo-600 px-6 py-8 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-white/20 backdrop-blur-sm mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tight">reCAPTCHA v2 Demo</h1>
            <p class="text-indigo-100 mt-2 text-sm opacity-90">Secure verification integration example</p>
        </div>

        <!-- Body -->
        <div class="p-8">
            <form id="verificationForm" action="/verify" method="POST">
                
                <!-- User Input -->
                <div class="mb-6">
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                    <input type="email" id="email" name="email" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition duration-200 outline-none bg-gray-50 hover:bg-white"
                        placeholder="user@example.com">
                </div>

                <!-- reCAPTCHA Widget -->
                <div class="flex flex-col items-center mb-6">
                    <p class="text-xs text-gray-500 mb-3">Please verify that you are human</p>
                    
                    <!-- 
                         FIX: The "Invalid site key" error occurs when the site key is invalid or not registered for the domain.
                         Here we use Google's official TEST site key which works on localhost and any domain for testing purposes.
                         It always returns a success token.
                         
                         Test Site Key: 6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI
                    -->
                    <div 
                        class="g-recaptcha" 
                        data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"
                        data-callback="onCaptchaSuccess"
                        data-expired-callback="onCaptchaExpired">
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn" disabled
                    class="w-full py-3.5 px-4 rounded-lg bg-indigo-600 text-white font-semibold text-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none shadow-md hover:shadow-lg">
                    Verify & Continue
                </button>

                <!-- Status Message -->
                <div id="statusMessage" class="mt-4 text-center text-sm font-medium hidden">
                    <span id="statusText"></span>
                </div>

            </form>
        </div>
        
        <!-- Footer -->
        <div class="bg-gray-50 px-6 py-4 border-t border-gray-100 flex justify-center items-center text-xs text-gray-400">
            <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path></svg>
            Secured by Google reCAPTCHA v2
        </div>
    </div>

    <script>
        // State variables to track captcha status
        let captchaToken = null;
        let isCaptchaValid = false;

        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');
        const statusText = document.getElementById('statusText');

        // Callback when captcha is solved successfully
        window.onCaptchaSuccess = function(token) {
            captchaToken = token;
            isCaptchaValid = true;
            
            // Enable button
            submitBtn.disabled = false;
            submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            submitBtn.classList.add('animate-pulse'); // visual feedback
            setTimeout(() => submitBtn.classList.remove('animate-pulse'), 500);
            
            // UI Feedback
            statusMessage.classList.remove('hidden', 'bg-red-50', 'text-red-700');
            statusMessage.classList.add('bg-green-50', 'text-green-700', 'p-3', 'rounded-lg');
            statusText.textContent = "Verification successful! You may proceed.";
            
            // Log for debugging
            console.log("reCAPTCHA Token:", token);
        };

        // Callback when captcha expires
        window.onCaptchaExpired = function() {
            isCaptchaValid = false;
            captchaToken = null;
            
            // Disable button
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');

            // UI Feedback
            statusMessage.classList.remove('hidden', 'bg-green-50', 'text-green-700');
            statusMessage.classList.add('bg-red-50', 'text-red-700', 'p-3', 'rounded-lg');
            statusText.textContent = "Verification expired. Please check the box again.";
        };

        // Form submission handling
        document.getElementById('verificationForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent actual form submission for this demo

            if (!isCaptchaValid) {
                statusMessage.classList.remove('hidden');
                statusMessage.classList.add('bg-red-50', 'text-red-700', 'p-3', 'rounded-lg');
                statusText.textContent = "Please complete the captcha first.";
                return;
            }

            // Simulate API call
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Verifying...
            `;

            setTimeout(() => {
                // Mock success response
                statusMessage.classList.remove('bg-red-50', 'text-red-700');
                statusMessage.classList.add('bg-green-50', 'text-green-700');
                statusText.textContent = "Identity verified successfully! Redirecting...";
                
                // Reset form for demo purposes after delay
                setTimeout(() => {
                    submitBtn.innerHTML = originalBtnText;
                    submitBtn.disabled = false;
                    grecaptcha.reset(); // Reset captcha widget
                    isCaptchaValid = false;
                    submitBtn.disabled = true;
                    statusMessage.classList.add('hidden');
                }, 3000);
            }, 1500);
        });
    </script>
</body>
</html>
