<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reCAPTCHA v2 Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://soufianodev.github.io/Toast-JS/libs/js/v2.1.0-beta/Toast.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        .toast-notification {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div id="toast-notification" class="toast-notification"></div>

    <div class="bg-white rounded-2xl shadow-xl overflow-hidden w-full max-w-md border border-gray-100">
        
        <div class="bg-indigo-600 pchoosed-8 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
                <svg class="w-64 h-64 -mt-16 -ml-16" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#FFFFFF" d="M44.7,-76.4C58.8,-69.2,71.8,-59.1,81.6,-46.6C91.4,-34.1,98,-19.2,95.8,-5.3C93.6,8.6,82.6,21.5,72.1,32.6C61.6,43.7,51.6,53,40.4,60.8C29.2,68.6,16.8,74.9,2.9,72.6C-11,70.3,-26.4,59.4,-38.3,50.4C-50.2,41.4,-58.6,34.3,-66.3,24.8C-74,15.3,-81,3.4,-79.8,-8.2C-78.6,-19.8,-69.2,-31.1,-58.6,-39.8C-48,-48.5,-36.2,-54.6,-24.2,-63.5C-12.2,-72.4,0.4,-84.1,14.1,-86.1C27.8,-88.1,42.7,-80.4,44.7,-76.4Z" transform="translate(100 100)" />
                </svg>
            </div>
            
            <div class="relative z-10">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-white/20 backdrop-blur-md mb-4 shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-white tracking-tight">reCAPTCHA v2 Demo</h1>
                <p class="text-indigo-100 mt-1 text-sm font-medium">reCAPTCHA v2 Verification</p>
            </div>
        </div>

        <div class="p-8">
            <form id="demoForm" onsubmit="handleSubmit(event)">
                
                <div class="mb-6">
                    <label for="username" class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                    <input type="text" id="username" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none bg-gray-50 focus:bg-white" placeholder="Enter your username">
                </div>

                <div class="mb-6 flex flex-col items-center">
                    <p class="text-xs text-gray-500 mb-3 font-medium uppercase tracking-wider">Security Check</p>
                    
                    <div 
                        class="g-recaptcha" 
                        data-sitekey="6LdNg9ssAAAAAG1VhB-ogfFhXZqtjt_la8wwjzsH"
                        data-callback="onCaptchaSuccess"
                        data-expired-callback="onCaptchaExpired">
                    </div>
                </div>

                <button type="submit" id="submitBtn" disabled
                    class="w-full py-3.5 px-4 rounded-xl bg-indigo-600 text-white font-semibold text-sm hover:bg-indigo-700 focus:outline-none focus:ring-4 focus:ring-indigo-500/30 transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-indigo-600 shadow-lg shadow-indigo-500/30">
                    Verify & Continue
                </button>
            </form>
        </div>
        
        <div class="bg-gray-50 px-8 py-4 border-t border-gray-100 flex items-center justify-center space-x-2 text-xs text-gray-400">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            <span>Protected by reCAPTCHA</span>
        </div>
    </div>

    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <script>
        let captchaToken = null;
        const submitBtn = document.getElementById('submitBtn');

        const successIcon = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9IiMxMGI5ODEiIHN0cm9rZS13aWR0aD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIj48cGF0aCBkPSJNMjIgMTEuMDhWMTJhMTAgMTAgMCAxIDEtNS45My05LjE0Ii8+PHBvbHlsaW5lIHBvaW50cz0iMjIgNCAxMiAxNC4wMSA5IDExLjAxIi8+PC9zdmc+';
        const warningIcon = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9IiNmNTllMGIiIHN0cm9rZS13aWR0aD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIj48cGF0aCBkPSJNMTAuMjkgMy44NkwxLjgyIDE4YTIgMiAwIDAgMCAxLjcxIDNoMTYuOTRhMiAyIDAgMCAwIDEuNzEtM0wxMy43MSAzLjg2YTIgMiAwIDAgMC0zLjQyIDB6Ii8+PGxpbmUgeDE9IjEyIiB5MT0iOSIgeDI9IjEyIiB5Mj0iMTMiLz48bGluZSB4MT0iMTIiIHkxPSIxNyIgeDI9IjEyLjAxIiB5Mj0iMTciLz48L3N2Zz4=';
        const errorIcon = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9IiNlZjQ0NDQiIHN0cm9rZS13aWR0aD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIj48Y2lyY2xlIGN4PSIxMiIgY3k9IjEyIiByPSIxMCIvPjxsaW5lIHgxPSIxNSIgeTE9IjkiIHgyPSI5IiB5Mj0iMTUiLz48bGluZSB4MT0iOSIgeTE9IjkiIHgyPSIxNSIgeTI9IjE1Ii8+PC9zdmc+';

        function showToast(type, message) {
            if (!window.Toast) return;

            let icon = errorIcon;
            let border = '4px solid #ef4444';

            if (type === 'success') {
                icon = successIcon;
                border = '4px solid #10b981';
            } else if (type === 'warning') {
                icon = warningIcon;
                border = '4px solid #f59e0b';
            }

            const toast = Toast.makeText(document.body, message, type === 'error' ? Toast.LENGTH_LONG : Toast.LENGTH_SHORT);
            toast.setStyle({
                background: '#ffffff',
                color: '#111827',
                borderRadius: '12px',
                boxShadow: '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)',
                borderLeft: border,
                padding: '14px 20px',
                fontSize: '14px',
                fontWeight: '500',
                fontFamily: "'Inter', sans-serif"
            })
            .setIcon(icon)
            .setPosition(Toast.POSITION_TOP_CENTER)
            .setAnimation(Toast.SLIDE_IN_TOP, Toast.FADE_OUT)
            .show();
        }

        window.onCaptchaSuccess = function(token) {
            captchaToken = token;
            submitBtn.disabled = false;
            submitBtn.classList.remove('opacity-40');
            showToast('success', 'Verification successful! You may proceed.');
        };

        window.onCaptchaExpired = function() {
            captchaToken = null;
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-40');
            showToast('warning', 'Verification expired. Please try again.');
        };

        function handleSubmit(e) {
            e.preventDefault();
            
            if (!captchaToken) {
                showToast('error', 'Please complete the captcha first!');
                return;
            }

            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white inline-block mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Verifying...
            `;

            setTimeout(() => {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                showToast('success', 'Identity verified successfully!');
                
                document.getElementById('demoForm').reset();
                grecaptcha.reset();
                submitBtn.disabled = true;
            }, 1500);
        }
    </script>
</body>
</html>
