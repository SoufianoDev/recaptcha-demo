<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reCAPTCHA v2 Demo</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Outer border around the captcha */
        .captcha-container {
            display: inline-block;
            padding: 15px;
            border: 2px solid #4285f4; /* Google Blue */
            border-radius: 8px;
            background-color: #ffffff;
            box-shadow: 0 0 20px rgba(66, 133, 244, 0.15); /* Soft blue glow */
            text-align: center;
        }

        .info-text {
            font-size: 13px;
            color: #333;
            margin-bottom: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <form action="?" method="POST">
        <div class="captcha-container">
            <div class="info-text">reCAPTCHA v2 Verification</div>
            <!-- Using your verified v2 Site Key -->
            <div class="g-recaptcha" data-sitekey="6LdNg9ssAAAAAG1VhB-ogfFhXZqtjt_la8wwjzsH"></div>
        </div>
    </form>

    <!-- Official Google reCAPTCHA API -->
    <script src='https://www.google.com/recaptcha/api.js'></script>

</body>
</html>
