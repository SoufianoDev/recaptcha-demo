<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reCAPTCHA v2 Demo - Soufianodev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://soufianodev.github.io/Toast-JS/libs/js/v2.1.0-beta/Toast.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .toast-notification { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; pointer-events: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center p-4">

    <div id="toast-notification" class="toast-notification"></div>

    <div class="bg-white rounded-2xl shadow-xl overflow-hidden w-full max-w-md border border-gray-100">
        
        <div class="bg-indigo-600 p-8 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
                <svg class="w-64 h-64 -mt-16 -ml-16" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#FFFFFF" d="M44.7,-76.4C58.8,-69.2,71.8,-59.1,81.6,-46.6C91.4,-34.1,98,-19.2,95.8,-5.3C93.6,8.6,82.6,21.5,72.1,32.6C61.6,43.7,51.6,53,40.4,60.8C29.2,68.6,16.8,74.9,2.9,72.6C-11,70.3,-26.4,59.4,-38.3,50.4C-50.2,41.4,-58.6,34.3,-66.3,24.8C-74,15.3,-81,3.4,-79.8,-8.2C-78.6,-19.8,-69.2,-31.1,-58.6,-39.8C-48,-48.5,-36.2,-54.6,-24.2,-63.5C-12.2,-72.4,0.4,-84.1,14.1,-86.1C27.8,-88.1,42.7,-80.4,44.7,-76.4Z" transform="translate(100 100)" />
                </svg>
            </div>
            
            <div class="relative z-10">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-white/20 backdrop-blur-md mb-4 shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-white tracking-tight">reCAPTCHA Demo</h1>
                <p class="text-indigo-100 mt-1 text-sm font-medium">Powered by Google</p>
            </div>
        </div>

        <div class="p-8">
            <form id="demoForm" onsubmit="handleSubmit(event)">
                
                <div class="mb-6">
                    <label for="username" class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                    <input type="text" id="username" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none bg-gray-50 focus:bg-white" placeholder="Enter your username">
                </div>

                <div class="mb-6 flex flex-col items-center">
                    <p class="text-xs text-gray-500 mb-3 font-medium uppercase tracking-wider">Security Check</p>
                    
                    <div 
                        class="g-recaptcha" 
                        data-sitekey="6LdNg9ssAAAAAG1VhB-ogfFhXZqtjt_la8wwjzsH"
                        data-callback="onCaptchaSuccess"
                        data-expired-callback="onCaptchaExpired">
                    </div>
                </div>

                <button type="submit" id="submitBtn" disabled
                    class="w-full py-3.5 px-4 rounded-xl bg-indigo-600 text-white font-semibold text-sm hover:bg-indigo-700 focus:outline-none focus:ring-4 focus:ring-indigo-500/30 transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-indigo-600 shadow-lg shadow-indigo-500/30">
                    Submit Verification
                </button>
            </form>
        </div>
        
        <div class="bg-gray-50 px-8 py-4 border-t border-gray-100 flex items-center justify-center space-x-2 text-xs text-gray-400">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            <span>Protected by reCAPTCHA</span>
        </div>
    </div>

    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <script>
        let captchaToken = null;
        const submitBtn = document.getElementById('submitBtn');

        function onCaptchaSuccess(token) {
            captchaToken = token;
            submitBtn.disabled = false;
            submitBtn.classList.remove('opacity-40');
            
            if (window.Toast) {
                const toast = Toast.makeText(
                    document.body,
                    'Verification Complete! You can now submit.',
                    Toast.LENGTH_SHORT
                );
                toast.setStyle({
                    background: 'linear-gradient(135deg, #10b981, #059669)',
                    color: '#fff',
                    borderRadius: '12px',
                    boxShadow: '0 8px 25px rgba(16, 185, 129, 0.3)',
                    fontSize: '14px',
                    fontWeight: '500',
                    padding: '14px 20px',
                    borderLeft: '4px solid #047857'
                })
                .setIcon("data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' class='h-5 w-5' viewBox='0 0 20 20' fill='%23fff'%3E%3Cpath fill-rule='evenodd' d='M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z' clip-rule='evenodd'/%3E%3C/svg%3E")
                .setPosition(Toast.POSITION_TOP_CENTER)
                .setAnimation(Toast.SLIDE_IN_TOP, Toast.FADE_OUT)
                .show();
            }
        }

        function onCaptchaExpired() {
            captchaToken = null;
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-40');
            
            if (window.Toast) {
                const toast = Toast.makeText(
                    document.body,
                    'Verification Expired. Please check the box again.',
                    Toast.LENGTH_SHORT
                );
                toast.setStyle({
                    background: 'linear-gradient(135deg, #f59e0b, #d97706)',
                    color: '#fff',
                    borderRadius: '12px',
                    boxShadow: '0 8px 25px rgba(245, 158, 11, 0.3)',
                    fontSize: '14px',
                    fontWeight: '500',
                    padding: '14px 20px',
                    borderLeft: '4px solid #b45309'
                })
                .setIcon("data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' class='h-5 w-5' viewBox='0 0 20 20' fill='%23fff'%3E%3Cpath fill-rule='evenodd' d='M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z' clip-rule='evenodd'/%3E%3C/svg%3E")
                .setPosition(Toast.POSITION_TOP_CENTER)
                .setAnimation(Toast.SLIDE_IN_TOP, Toast.FADE_OUT)
                .show();
            }
        }

        function handleSubmit(e) {
            e.preventDefault();
            
            if (!captchaToken) {
                if (window.Toast) {
                    const toast = Toast.makeText(
                        document.body,
                        'Please complete the captcha first!',
                        Toast.LENGTH_SHORT
                    );
                    toast.setStyle({
                        background: 'linear-gradient(135deg, #ef4444, #dc2626)',
                        color: '#fff',
                        borderRadius: '12px',
                        boxShadow: '0 8px 25px rgba(239, 68, 68, 0.3)',
                        fontSize: '14px',
                        fontWeight: '500',
                        padding: '14px 20px',
                        borderLeft: '4px solid #991b1b'
                    })
                    .setIcon("data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' class='h-5 w-5' viewBox='0 0 20 20' fill='%23fff'%3E%3Cpath fill-rule='evenodd' d='M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z' clip-rule='evenodd'/%3E%3C/svg%3E")
                    .setPosition(Toast.POSITION_TOP_CENTER)
                    .setAnimation(Toast.SLIDE_IN_TOP, Toast.FADE_OUT)
                    .show();
                } else {
                    alert('Please complete the captcha first!');
                }
                return;
            }

            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white inline-block mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Sending...
            `;

            setTimeout(() => {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                
                if (window.Toast) {
                    const toast = Toast.makeText(
                        document.body,
                        'Success! Form submitted securely.',
                        Toast.LENGTH_SHORT
                    );
                    toast.setStyle({
                        background: 'linear-gradient(135deg, #10b981, #059669)',
                        color: '#fff',
                        borderRadius: '12px',
                        boxShadow: '0 8px 25px rgba(16, 185, 129, 0.3)',
                        fontSize: '14px',
                        fontWeight: '500',
                        padding: '14px 20px',
                        borderLeft: '4px solid #047857'
                    })
                    .setIcon("data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' class='h-5 w-5' viewBox='0 0 20 20' fill='%23fff'%3E%3Cpath fill-rule='evenodd' d='M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z' clip-rule='evenodd'/%3E%3C/svg%3E")
                    .setPosition(Toast.POSITION_TOP_CENTER)
                    .setAnimation(Toast.SLIDE_IN_TOP, Toast.FADE_OUT)
                    .show();
                }
                
                document.getElementById('demoForm').reset();
                grecaptcha.reset();
                submitBtn.disabled = true;
            }, 1500);
        }
    </script>
</body>
</html>
